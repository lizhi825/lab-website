<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 海洋智能装备研究所</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/logo.jpg" alt="Logo">
                <h3>海洋智能装备研究所</h3>
                <p>哈尔滨理工大学 · 威海校区</p>
                <p style="color:var(--accent);font-weight:600;margin-top:8px;">🔐 管理员登录</p>
            </div>
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>管理员账号</label>
                    <input type="text" id="adminUsername" placeholder="请输入管理员账号" required>
                </div>
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                </div>
                <button type="submit" class="btn-login">管理员登录</button>
                <div class="login-error" id="adminLoginError">账号或密码错误</div>
            </form>
            <div class="login-back">
                <a href="index.html">← 返回首页</a>
                <span style="margin:0 8px;color:#ccc;">|</span>
                <a href="login.html">用户登录</a>
            </div>
            <p style="text-align:center;margin-top:16px;font-size:12px;color:#999;">测试账号：admin / admin123</p>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script>
        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const errorEl = document.getElementById('adminLoginError');

            const user = SiteData.users.find(u => u.username === username && u.password === password && u.role === 'admin');
            if (user) {
                setCurrentUser({ username: user.username, role: user.role });
                window.location.href = 'admin.html';
            } else {
                errorEl.classList.add('show');
                setTimeout(() => errorEl.classList.remove('show'), 2000);
            }
        }
    </script>
</body>
</html>
