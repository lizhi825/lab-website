<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #020810;
  position: relative;
}

.bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #010508 0%, #051220 30%, #081a30 50%, #051220 70%, #010508 100%);
  z-index: 0;
}

/* 教师照片区 */
.teacher-area {
  position: relative;
  width: 100%;
  height: 580px;
  overflow: hidden;
  z-index: 2;
}
.teacher-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 30%;
  filter: brightness(0.65) contrast(1.05);
}
.teacher-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(2,8,16,0.2) 0%, transparent 25%, transparent 70%, rgba(2,8,16,1) 100%);
}
.teacher-label {
  position: absolute;
  bottom: 30px;
  left: 60px;
  z-index: 3;
  font-size: 22px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 6px;
  background: rgba(0,0,0,0.4);
  padding: 6px 20px;
}

.content {
  position: relative;
  z-index: 2;
  padding: 32px 60px 60px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

/* 导师卡片 */
.mentors {
  display: flex;
  gap: 20px;
  margin-bottom: 28px;
}
.mentor-card {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(77,168,218,0.12);
  border-radius: 10px;
  padding: 24px 16px;
  text-align: center;
}
.mentor-card .m-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a3a5c, #0d2847);
  border: 2px solid rgba(77,168,218,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 26px;
  font-weight: 700;
  color: #4da8da;
}
.mentor-card .m-name {
  font-size: 24px;
  color: #fff;
  font-weight: 700;
  letter-spacing: 2px;
}
.mentor-card .m-role {
  font-size: 16px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* 学生成就 */
.achieve-title {
  font-size: 20px;
  color: #4da8da;
  letter-spacing: 4px;
  margin-bottom: 16px;
  text-align: center;
}
.achieve-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-bottom: 28px;
}
.ach-tag {
  background: rgba(77,168,218,0.06);
  border: 1px solid rgba(77,168,218,0.12);
  border-radius: 8px;
  padding: 16px 20px;
  text-align: center;
  min-width: 160px;
}
.ach-tag .name {
  font-size: 22px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 2px;
}
.ach-tag .desc {
  font-size: 15px;
  color: #4da8da;
  letter-spacing: 1px;
  margin-top: 4px;
  line-height: 1.3;
}

/* 环境照片 */
.env-photos {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}
.env-photo {
  flex: 1;
  height: 150px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(77,168,218,0.12);
}
.env-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CTA */
.cta {
  text-align: center;
  margin-top: auto;
  padding: 24px 40px;
  background: rgba(77,168,218,0.06);
  border: 2px solid rgba(77,168,218,0.15);
  border-radius: 14px;
}
.cta .qq-num {
  font-size: 52px;
  font-weight: 900;
  color: #4da8da;
  letter-spacing: 6px;
  margin-bottom: 4px;
}
.cta .qq-group {
  font-size: 18px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.cta .info {
  font-size: 15px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="teacher-area">
  <img src="../assets/gallery/teachers.jpg" alt="导师团队">
  <div class="teacher-overlay"></div>
  <div class="teacher-label">指导教师团队</div>
</div>

<div class="content">
  <div class="mentors">
    <div class="mentor-card">
      <div class="m-avatar">赵</div>
      <div class="m-name">赵金涛</div>
      <div class="m-role">副教授 · 硕导</div>
    </div>
    <div class="mentor-card">
      <div class="m-avatar">张</div>
      <div class="m-name">张振杰</div>
      <div class="m-role">指导教师</div>
    </div>
    <div class="mentor-card">
      <div class="m-avatar">贾</div>
      <div class="m-name">贾明川</div>
      <div class="m-role">指导教师</div>
    </div>
  </div>

  <div class="achieve-title">▎ 优秀成员成就</div>
  <div class="achieve-grid">
    <div class="ach-tag">
      <div class="name">李智浩</div>
      <div class="desc">国家级大创 · 国奖</div>
    </div>
    <div class="ach-tag">
      <div class="name">吴佳璘</div>
      <div class="desc">国家级大创 · 建模获奖</div>
    </div>
    <div class="ach-tag">
      <div class="name">孙文源</div>
      <div class="desc">国家级大创 · 省二等奖</div>
    </div>
    <div class="ach-tag">
      <div class="name">陈伟明</div>
      <div class="desc">保送山东大学</div>
    </div>
    <div class="ach-tag">
      <div class="name">董艳琪</div>
      <div class="desc">研究生 · 发表SCI</div>
    </div>
    <div class="ach-tag">
      <div class="name">康家硕</div>
      <div class="desc">国家级大创负责人</div>
    </div>
  </div>

  <div class="env-photos">
    <div class="env-photo">
      <img src="../assets/gallery/lab-environment/1a6f746c373cbdbd4ec07d8bdb1badfb.jpg" alt="">
    </div>
    <div class="env-photo">
      <img src="../assets/gallery/lab-environment/34a8c498b45b0569f88d6e5a2093defa.jpg" alt="">
    </div>
    <div class="env-photo">
      <img src="../assets/gallery/lab-environment/40fb8e5f2d34a6835841c2c03ebdda24.jpg" alt="">
    </div>
  </div>

  <div class="cta">
    <div class="qq-num">464750423</div>
    <div class="qq-group">🐧 哈理工海智所迎新群</div>
    <div class="info">📍 一号实验楼401 · 📞 17667031628</div>
  </div>
</div>
</body>
</html>
