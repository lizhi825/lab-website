<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #020810;
  position: relative;
}

.bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #010508 0%, #051220 30%, #081a30 50%, #051220 70%, #010508 100%);
  z-index: 0;
}

/* 顶部大图 */
.top-img {
  position: relative;
  width: 100%;
  height: 520px;
  overflow: hidden;
  z-index: 2;
}
.top-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6);
}
.top-img .img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(2,8,16,0.3) 0%, transparent 30%, transparent 65%, rgba(2,8,16,1) 100%);
}
.top-img .img-title {
  position: absolute;
  bottom: 30px;
  left: 60px;
  z-index: 3;
}
.top-img .img-title .tag {
  font-size: 20px;
  letter-spacing: 8px;
  color: #4da8da;
  border: 2px solid rgba(77,168,218,0.4);
  padding: 4px 20px;
  display: inline-block;
  margin-bottom: 12px;
  background: rgba(0,0,0,0.4);
}
.top-img .img-title h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 64px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 6px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.top-img .img-title h1 span {
  color: #4da8da;
}

.content {
  position: relative;
  z-index: 2;
  padding: 28px 60px 60px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

/* FAQ */
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 24px;
}
.faq-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(77,168,218,0.08);
  border-radius: 10px;
  padding: 22px 28px;
}
.faq-item .q {
  font-size: 24px;
  color: #4da8da;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.faq-item .a {
  font-size: 20px;
  color: rgba(255,255,255,0.5);
  line-height: 1.5;
  letter-spacing: 1px;
}

/* 培训 */
.train-section {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
.train-box {
  flex: 1;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(77,168,218,0.08);
  border-radius: 10px;
  padding: 20px 12px;
  text-align: center;
}
.train-box .t-icon {
  font-size: 32px;
  margin-bottom: 6px;
}
.train-box .t-name {
  font-size: 18px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 1px;
}
.train-box .t-detail {
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  margin-top: 3px;
}

/* 环境照片 */
.env-row {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
.env-img {
  flex: 1;
  height: 140px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(77,168,218,0.1);
}
.env-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CTA */
.cta {
  text-align: center;
  margin-top: auto;
  padding: 24px 40px;
  background: rgba(77,168,218,0.06);
  border: 2px solid rgba(77,168,218,0.15);
  border-radius: 14px;
}
.cta .cta-title {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 4px;
  margin-bottom: 10px;
}
.cta .qq-num {
  font-size: 52px;
  font-weight: 900;
  color: #4da8da;
  letter-spacing: 6px;
  margin-bottom: 4px;
}
.cta .qq-group {
  font-size: 18px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.cta .info {
  font-size: 15px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="top-img">
  <img src="../assets/gallery/lab-environment/338aabb77425ca45558443a4c7be119a.jpg" alt="实验室">
  <div class="img-overlay"></div>
  <div class="img-title">
    <div class="tag">新生必看</div>
    <h1>你最关心的<span>几个问题</span></h1>
  </div>
</div>

<div class="content">
  <div class="faq-list">
    <div class="faq-item">
      <div class="q">Q：有专业要求吗？</div>
      <div class="a">不需要！不限专业，只要感兴趣就能报名。</div>
    </div>
    <div class="faq-item">
      <div class="q">Q：零基础能加入吗？</div>
      <div class="a">当然！开学有学长带教培训，从零开始教。</div>
    </div>
    <div class="faq-item">
      <div class="q">Q：考核难吗？</div>
      <div class="a">不难！认真学就能过，每周一考循序渐进。加油owo</div>
    </div>
  </div>

  <div class="train-section">
    <div class="train-box">
      <div class="t-icon">✏️</div>
      <div class="t-name">草图绘制</div>
      <div class="t-detail">CAD</div>
    </div>
    <div class="train-box">
      <div class="t-icon">🔧</div>
      <div class="t-name">三维建模</div>
      <div class="t-detail">Creo / SW</div>
    </div>
    <div class="train-box">
      <div class="t-icon">💻</div>
      <div class="t-name">编程语言</div>
      <div class="t-detail">C / Python</div>
    </div>
    <div class="train-box">
      <div class="t-icon">✅</div>
      <div class="t-name">每周一考</div>
      <div class="t-detail">包教包会</div>
    </div>
  </div>

  <div class="env-row">
    <div class="env-img">
      <img src="../assets/gallery/lab-environment/91c45b6cb29323ea181014e2d70b4fd3.jpg" alt="">
    </div>
    <div class="env-img">
      <img src="../assets/gallery/lab-environment/c8aaeb6439b800e3d1b97dae929d6d7c.jpg" alt="">
    </div>
    <div class="env-img">
      <img src="../assets/gallery/lab-environment/cc5d98046fc2cefdf16d7e8b8a893e40.jpg" alt="">
    </div>
    <div class="env-img">
      <img src="../assets/gallery/lab-environment/ef2a7ce2e4f35e3404d563ac4585babd.jpg" alt="">
    </div>
  </div>

  <div class="cta">
    <div class="cta-title">🐧 扫码加入迎新群</div>
    <div class="qq-num">464750423</div>
    <div class="qq-group">哈理工海智所迎新群</div>
    <div class="info">📍 一号实验楼401 · 📞 17667031628</div>
  </div>
</div>
</body>
</html>
