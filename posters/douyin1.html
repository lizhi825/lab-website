<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #020810;
  position: relative;
}

/* 背景 */
.bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #010508 0%, #051220 25%, #081a30 50%, #051220 75%, #010508 100%);
  z-index: 0;
}

/* 顶部图片区域 */
.hero-img-area {
  position: relative;
  width: 100%;
  height: 620px;
  overflow: hidden;
  z-index: 2;
}
.hero-img-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) saturate(0.8);
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(2,8,16,0.3) 0%, transparent 30%, transparent 70%, rgba(2,8,16,1) 100%);
}
.hero-text {
  position: absolute;
  bottom: 40px;
  left: 60px;
  right: 60px;
  z-index: 3;
}
.hero-text .badge {
  display: inline-block;
  font-size: 20px;
  letter-spacing: 8px;
  color: #4da8da;
  border: 2px solid rgba(77,168,218,0.4);
  padding: 6px 24px;
  margin-bottom: 16px;
  background: rgba(0,0,0,0.4);
}
.hero-text h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 80px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 8px;
  line-height: 1.2;
  text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.hero-text h1 span {
  color: #4da8da;
}

/* 内容区 */
.content {
  position: relative;
  z-index: 2;
  padding: 36px 60px 60px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

/* 亮点行 */
.highlights {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
}
.hl {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(77,168,218,0.1);
  border-radius: 10px;
  padding: 24px 16px;
  text-align: center;
}
.hl .hl-icon {
  font-size: 36px;
  margin-bottom: 8px;
}
.hl .hl-title {
  font-size: 20px;
  color: #fff;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.hl .hl-desc {
  font-size: 15px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
}

/* 实验室照片行 */
.photos-row {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
}
.photo-card {
  flex: 1;
  height: 200px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  border: 1px solid rgba(77,168,218,0.15);
}
.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-card .photo-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 14px;
  color: #fff;
  text-align: center;
  letter-spacing: 2px;
}

/* 底部CTA */
.cta {
  text-align: center;
  margin-top: auto;
  padding: 30px 50px;
  background: rgba(77,168,218,0.06);
  border: 2px solid rgba(77,168,218,0.15);
  border-radius: 14px;
}
.cta .cta-title {
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.cta .qq-num {
  font-size: 56px;
  font-weight: 900;
  color: #4da8da;
  letter-spacing: 6px;
  margin-bottom: 4px;
}
.cta .qq-group {
  font-size: 20px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.cta .info {
  font-size: 16px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="hero-img-area">
  <img src="../assets/gallery/lab-environment/6aa4dad0643b3741b898ef9a42a0fe1f.jpg" alt="实验室">
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <div class="badge">2026 纳 新</div>
    <h1>海智所<span>招新</span></h1>
  </div>
</div>

<div class="content">
  <div class="highlights">
    <div class="hl">
      <div class="hl-icon">🔬</div>
      <div class="hl-title">零基础</div>
      <div class="hl-desc">不限专业</div>
    </div>
    <div class="hl">
      <div class="hl-icon">🏆</div>
      <div class="hl-title">国家级大创</div>
      <div class="hl-desc">多项在研</div>
    </div>
    <div class="hl">
      <div class="hl-icon">📄</div>
      <div class="hl-title">SCI/EI论文</div>
      <div class="hl-desc">10余篇</div>
    </div>
    <div class="hl">
      <div class="hl-icon">🎓</div>
      <div class="hl-title">保研山大</div>
      <div class="hl-desc">优秀前辈</div>
    </div>
  </div>

  <div class="photos-row">
    <div class="photo-card">
      <img src="../assets/gallery/lab-environment/2e2bcc4fb2d868aea075c94a3ea482d3.jpg" alt="">
      <div class="photo-label">科研实验</div>
    </div>
    <div class="photo-card">
      <img src="../assets/gallery/lab-environment/8d89e2a21420d9768b25d23c64cbd31e.jpg" alt="">
      <div class="photo-label">团队协作</div>
    </div>
    <div class="photo-card">
      <img src="../assets/gallery/lab-environment/ac0dae6a6249e7a636cca5ede3cf47e8.jpg" alt="">
      <div class="photo-label">实验设备</div>
    </div>
  </div>

  <div class="cta">
    <div class="cta-title">🐧 扫码加入迎新群</div>
    <div class="qq-num">464750423</div>
    <div class="qq-group">哈理工海智所迎新群</div>
    <div class="info">📍 一号实验楼401 · 📞 17667031628</div>
  </div>
</div>
</body>
</html>
