<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 海洋智能装备研究所</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/logo.jpg" alt="Logo">
                <h3>海洋智能装备研究所</h3>
                <p>哈尔滨理工大学 · 威海校区</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">登 录</button>
                <div class="login-error" id="loginError">用户名或密码错误</div>
            </form>
            <div class="login-back">
                <a href="index.html">← 返回首页</a>
                <span style="margin:0 8px;color:#ccc;">|</span>
                <a href="admin-login.html">管理员登录</a>
            </div>
            <p style="text-align:center;margin-top:16px;font-size:12px;color:#999;">测试账号：user / 123456</p>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('loginError');

            const user = SiteData.users.find(u => u.username === username && u.password === password);
            if (user) {
                setCurrentUser({ username: user.username, role: user.role });
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                errorEl.classList.add('show');
                setTimeout(() => errorEl.classList.remove('show'), 2000);
            }
        }
    </script>
</body>
</html>
